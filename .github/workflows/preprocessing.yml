name: Auto Preprocessing Dataset

on:
  push:
    branches: [main]
    paths-ignore:
      - "preprocessing/dataset_preprocessing.csv"

permissions:
  contents: write

jobs:
  preprocessing:
    runs-on: ubuntu-latest

    env:
      DATA_PATH: dataset_raw/dataset.csv

    steps:
      - name: Checkout repository
        uses: actions/checkout@v3

      - name: Setup Python
        uses: actions/setup-python@v4
        with:
          python-version: "3.12"

      - name: Cache pip dependencies
        uses: actions/cache@v3
        with:
          path: ~/.cache/pip
          key: ${{ runner.os }}-pip-${{ hashFiles('**/requirements.txt') }}
          restore-keys: |
            ${{ runner.os }}-pip-

      - name: Install dependencies
        run: |
          pip install --upgrade pip
          pip install pandas scikit-learn

      - name: Run preprocessing script
        run: |
          set -e
          echo "Starting preprocessing..."
          python preprocessing/automate_krisnarhesa.py

      - name: Check changes
        id: check_changes
        run: |
          if [[ -n $(git status --porcelain) ]]; then
            echo "changes=true" >> $GITHUB_OUTPUT
          else
            echo "changes=false" >> $GITHUB_OUTPUT
          fi

      - name: Commit & Push (if changes exist)
        if: steps.check_changes.outputs.changes == 'true'
        run: |
          git config --global user.name "github-actions"
          git config --global user.email "actions@github.com"
          git add preprocessing/dataset_preprocessing.csv
          git commit -m "Auto update preprocessing dataset [CI]"
          git push https://x-access-token:${{ secrets.GITHUB_TOKEN }}@github.com/${{ github.repository }}.git

      - name: No changes detected
        if: steps.check_changes.outputs.changes == 'false'
        run: echo "No changes to commit."
